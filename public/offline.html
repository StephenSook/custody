<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Custody is offline</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        background: oklch(0.15 0.012 250);
        color: oklch(0.96 0.004 250);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        padding: 24px;
        text-align: center;
      }
      .ring {
        width: 56px; height: 56px; border-radius: 50%;
        border: 6px solid oklch(0.84 0.17 152);
        margin: 0 auto 20px;
        position: relative;
      }
      .ring::after {
        content: ""; position: absolute; inset: 0; margin: auto;
        width: 16px; height: 16px; border-radius: 50%;
        background: oklch(0.84 0.17 152);
      }
      h1 { font-size: 16px; font-weight: 500; letter-spacing: 0.02em; margin: 0 0 8px; }
      p { font-size: 12px; color: oklch(0.66 0.02 250); max-width: 30ch; margin: 0 auto 18px; line-height: 1.6; }
      button {
        background: transparent;
        color: oklch(0.84 0.17 152);
        border: 1px solid oklch(0.5 0.1 152);
        border-radius: 8px;
        padding: 8px 16px;
        font: inherit;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        cursor: pointer;
      }
      button:hover { background: oklch(0.84 0.17 152 / 0.1); }
    </style>
  </head>
  <body>
    <div>
      <div class="ring" aria-hidden="true"></div>
      <h1>Custody is offline</h1>
      <p>
        The live cross-region consistency view needs a connection. Reconnect to resume. No state is
        served from cache, so what you see is always current.
      </p>
      <button type="button" onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
